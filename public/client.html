<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal WebSocket Client</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #050607;
    --panel: #0a0f0c;
    --text: #a8ffbf;
    --muted: #74a583;
    --line: rgba(120, 255, 170, 0.14);
    --accent: #2cff7a;
    --danger: #ff6b6b;
    --warn: #ffd166;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top, rgba(44, 255, 122, 0.08), transparent 28%),
      linear-gradient(180deg, #020302, #050607 55%, #020302);
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }

  .wrap {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    background: rgba(10, 15, 12, 0.86);
    padding: 12px 14px;
    border-radius: 14px;
  }

  .title {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .title strong {
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    white-space: nowrap;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--danger);
    box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.08);
  }

  .dot.online {
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(44, 255, 122, 0.10);
  }

  .terminal {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(7, 17, 12, 0.96), rgba(4, 7, 5, 0.96));
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .output {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    white-space: pre-wrap;
    line-height: 1.45;
  }

  .line {
    margin: 0 0 8px 0;
    word-break: break-word;
  }

  .sys { color: var(--muted); }
  .ok { color: var(--accent); }
  .bad { color: var(--danger); }
  .warn { color: var(--warn); }

  .promptbar {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--line);
    background: rgba(3, 6, 4, 0.9);
    padding: 10px 12px;
    gap: 10px;
  }

  .prompt {
    color: var(--accent);
    white-space: nowrap;
  }

  input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font: inherit;
    caret-color: var(--accent);
  }

  input::placeholder {
    color: rgba(168, 255, 191, 0.35);
  }

  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  button {
    border: 1px solid var(--line);
    background: rgba(10, 15, 12, 0.86);
    color: var(--text);
    font: inherit;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    border-color: rgba(44, 255, 122, 0.35);
  }

  .mini {
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <strong>TERMINAL CLIENT</strong>
        <div class="mini">Commands: <span class="ok">/login user pass</span>, <span class="ok">/msg text</span>, <span class="ok">/ping</span>, <span class="ok">/help</span></div>
      </div>
      <div class="status">
        <span class="dot" id="dot"></span>
        <span id="statusText">disconnected</span>
      </div>
    </div>

    <div class="terminal">
      <div class="output" id="output"></div>

      <div class="promptbar">
        <span class="prompt" id="prompt">&gt;</span>
        <input id="cmd" type="text" autocomplete="off" spellcheck="false" placeholder="type /help" />
      </div>
    </div>

    <div class="row">
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn">Disconnect</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

<script>
  const output = document.getElementById("output");
  const cmd = document.getElementById("cmd");
  const statusText = document.getElementById("statusText");
  const dot = document.getElementById("dot");
  const promptEl = document.getElementById("prompt");

  const connectBtn = document.getElementById("connectBtn");
  const disconnectBtn = document.getElementById("disconnectBtn");
  const clearBtn = document.getElementById("clearBtn");

  let socket = null;
  let authed = false;
  let username = "";

  function print(text, cls = "sys") {
    const line = document.createElement("div");
    line.className = `line ${cls}`;
    line.textContent = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  }

  function setStatus(text, online = false) {
    statusText.textContent = text;
    dot.classList.toggle("online", online);
  }

  function serverUrl() {
    const host = window.location.hostname || "localhost";
    const scheme = window.location.protocol === "https:" ? "wss" : "ws";
    return `${scheme}://${host}:8080`;
  }

  function connect() {
    if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
      print("already connected or connecting", "warn");
      return;
    }

    const url = serverUrl();
    print(`connecting to ${url} ...`, "sys");
    setStatus("connecting", false);

    socket = new WebSocket(url);

    socket.onopen = () => {
      print("connection established", "ok");
      setStatus("connected", true);
    };

    socket.onclose = () => {
      print("connection closed", "bad");
      setStatus("disconnected", false);
      authed = false;
      username = "";
      promptEl.textContent = ">";
    };

    socket.onerror = () => {
      print("socket error", "bad");
      setStatus("error", false);
    };

    socket.onmessage = (event) => {
      let parsed = null;

      try {
        parsed = JSON.parse(event.data);
      } catch (_) {
        print(String(event.data), "sys");
        return;
      }

      if (parsed.status === "success" && parsed.message === "logged in") {
        authed = true;
        setStatus(`connected as ${username}`, true);
        promptEl.textContent = `${username}>`;
        print("login verified", "ok");
        return;
      }

      if (parsed.status === "fail") {
        authed = false;
        promptEl.textContent = ">";
        print(parsed.message || "login failed", "bad");
        return;
      }

      if (parsed.status === "created") {
        authed = false;
        print(parsed.message || "account created", "warn");
        print("log in again to verify", "warn");
        return;
      }

      if (parsed.message) {
        print(parsed.message, "sys");
        return;
      }

      print("received server response", "sys");
    };
  }

  function disconnect() {
    if (socket) socket.close();
  }

  function clear() {
    output.innerHTML = "";
  }

  function send(payload) {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      print("not connected", "bad");
      return false;
    }
    socket.send(JSON.stringify(payload));
    return true;
  }

  function toUtf8Bytes(str) {
    return unescape(encodeURIComponent(str));
  }

  function md5cycle(x, k) {
    let [a, b, c, d] = x;

    function ff(a, b, c, d, x, s, t) {
      a = (a + ((b & c) | (~b & d)) + x + t) | 0;
      return (((a << s) | (a >>> (32 - s))) + b) | 0;
    }

    function gg(a, b, c, d, x, s, t) {
      a = (a + ((b & d) | (c & ~d)) + x + t) | 0;
      return (((a << s) | (a >>> (32 - s))) + b) | 0;
    }

    function hh(a, b, c, d, x, s, t) {
      a = (a + (b ^ c ^ d) + x + t) | 0;
      return (((a << s) | (a >>> (32 - s))) + b) | 0;
    }

    function ii(a, b, c, d, x, s, t) {
      a = (a + (c ^ (b | ~d)) + x + t) | 0;
      return (((a << s) | (a >>> (32 - s))) + b) | 0;
    }

    a = ff(a, b, c, d, k[0], 7, -680876936);
    d = ff(d, a, b, c, k[1], 12, -389564586);
    c = ff(c, d, a, b, k[2], 17, 606105819);
    b = ff(b, c, d, a, k[3], 22, -1044525330);
    a = ff(a, b, c, d, k[4], 7, -176418897);
    d = ff(d, a, b, c, k[5], 12, 1200080426);
    c = ff(c, d, a, b, k[6], 17, -1473231341);
    b = ff(b, c, d, a, k[7], 22, -45705983);
    a = ff(a, b, c, d, k[8], 7, 1770035416);
    d = ff(d, a, b, c, k[9], 12, -1958414417);
    c = ff(c, d, a, b, k[10], 17, -42063);
    b = ff(b, c, d, a, k[11], 22, -1990404162);
    a = ff(a, b, c, d, k[12], 7, 1804603682);
    d = ff(d, a, b, c, k[13], 12, -40341101);
    c = ff(c, d, a, b, k[14], 17, -1502002290);
    b = ff(b, c, d, a, k[15], 22, 1236535329);

    a = gg(a, b, c, d, k[1], 5, -165796510);
    d = gg(d, a, b, c, k[6], 9, -1069501632);
    c = gg(c, d, a, b, k[11], 14, 643717713);
    b = gg(b, c, d, a, k[0], 20, -373897302);
    a = gg(a, b, c, d, k[5], 5, -701558691);
    d = gg(d, a, b, c, k[10], 9, 38016083);
    c = gg(c, d, a, b, k[15], 14, -660478335);
    b = gg(b, c, d, a, k[4], 20, -405537848);
    a = gg(a, b, c, d, k[9], 5, 568446438);
    d = gg(d, a, b, c, k[14], 9, -1019803690);
    c = gg(c, d, a, b, k[3], 14, -187363961);
    b = gg(b, c, d, a, k[8], 20, 1163531501);
    a = gg(a, b, c, d, k[13], 5, -1444681467);
    d = gg(d, a, b, c, k[2], 9, -51403784);
    c = gg(c, d, a, b, k[7], 14, 1735328473);
    b = gg(b, c, d, a, k[12], 20, -1926607734);

    a = hh(a, b, c, d, k[5], 4, -378558);
    d = hh(d, a, b, c, k[8], 11, -2022574463);
    c = hh(c, d, a, b, k[11], 16, 1839030562);
    b = hh(b, c, d, a, k[14], 23, -35309556);
    a = hh(a, b, c, d, k[1], 4, -1530992060);
    d = hh(d, a, b, c, k[4], 11, 1272893353);
    c = hh(c, d, a, b, k[7], 16, -155497632);
    b = hh(b, c, d, a, k[10], 23, -1094730640);
    a = hh(a, b, c, d, k[13], 4, 681279174);
    d = hh(d, a, b, c, k[0], 11, -358537222);
    c = hh(c, d, a, b, k[3], 16, -722521979);
    b = hh(b, c, d, a, k[6], 23, 76029189);
    a = hh(a, b, c, d, k[9], 4, -640364487);
    d = hh(d, a, b, c, k[12], 11, -421815835);
    c = hh(c, d, a, b, k[15], 16, 530742520);
    b = hh(b, c, d, a, k[2], 23, -995338651);

    a = ii(a, b, c, d, k[0], 6, -198630844);
    d = ii(d, a, b, c, k[7], 10, 1126891415);
    c = ii(c, d, a, b, k[14], 15, -1416354905);
    b = ii(b, c, d, a, k[5], 21, -57434055);
    a = ii(a, b, c, d, k[12], 6, 1700485571);
    d = ii(d, a, b, c, k[3], 10, -1894986606);
    c = ii(c, d, a, b, k[10], 15, -1051523);
    b = ii(b, c, d, a, k[1], 21, -2054922799);
    a = ii(a, b, c, d, k[8], 6, 1873313359);
    d = ii(d, a, b, c, k[15], 10, -30611744);
    c = ii(c, d, a, b, k[6], 15, -1560198380);
    b = ii(b, c, d, a, k[13], 21, 1309151649);
    a = ii(a, b, c, d, k[4], 6, -145523070);
    d = ii(d, a, b, c, k[11], 10, -1120210379);
    c = ii(c, d, a, b, k[2], 15, 718787259);
    b = ii(b, c, d, a, k[9], 21, -343485551);

    x[0] = (x[0] + a) | 0;
    x[1] = (x[1] + b) | 0;
    x[2] = (x[2] + c) | 0;
    x[3] = (x[3] + d) | 0;
  }

  function md5blk(s) {
    const md5blks = [];
    for (let i = 0; i < 64; i += 4) {
      md5blks[i >> 2] =
        s.charCodeAt(i) +
        (s.charCodeAt(i + 1) << 8) +
        (s.charCodeAt(i + 2) << 16) +
        (s.charCodeAt(i + 3) << 24);
    }
    return md5blks;
  }

  function md51(s) {
    let n = s.length;
    let state = [1732584193, -271733879, -1732584194, 271733878];
    let i;

    for (i = 64; i <= n; i += 64) {
      md5cycle(state, md5blk(s.substring(i - 64, i)));
    }

    s = s.substring(i - 64);
    const tail = new Array(16).fill(0);

    for (i = 0; i < s.length; i++) {
      tail[i >> 2] |= s.charCodeAt(i) << ((i % 4) << 3);
    }

    tail[i >> 2] |= 0x80 << ((i % 4) << 3);

    if (i > 55) {
      md5cycle(state, tail);
      for (i = 0; i < 16; i++) tail[i] = 0;
    }

    tail[14] = n * 8;
    md5cycle(state, tail);
    return state;
  }

  function rhex(n) {
    let s = "";
    for (let j = 0; j < 4; j++) {
      s += ("0" + ((n >> (j * 8 + 4)) & 0x0F).toString(16)).slice(-1);
      s += ("0" + ((n >> (j * 8)) & 0x0F).toString(16)).slice(-1);
    }
    return s;
  }

  function hex(x) {
    for (let i = 0; i < x.length; i++) {
      x[i] = rhex(x[i]);
    }
    return x.join("");
  }

  function md5(s) {
    return hex(md51(toUtf8Bytes(s)));
  }

  function handleCommand(value) {
    const trimmed = value.trim();
    if (!trimmed) return;

    if (trimmed === "/help") {
      print("commands:", "sys");
      print("  /login user pass", "sys");
      print("  /msg your message here", "sys");
      print("  /ping", "sys");
      print("  /help", "sys");
      return;
    }

    if (trimmed === "/ping") {
      send({ command: "ping", data: {} });
      print("> /ping", "ok");
      return;
    }

    if (trimmed.startsWith("/login ")) {
      const parts = trimmed.split(" ");
      if (parts.length < 3) {
        print("usage: /login user pass", "bad");
        return;
      }

      const user = parts[1];
      const pass = parts.slice(2).join(" ");
      const hashed = md5(pass);

      username = user;
      send({
        command: "login",
        data: {
          username: user,
          password: hashed
        }
      });

      print(`> /login ${user} ${hashed}`, "ok");
      return;
    }

    if (trimmed.startsWith("/msg ")) {
      if (!authed) {
        print("blocked: log in first with /login user pass", "bad");
        return;
      }

      const message = trimmed.slice(5);
      send({
        command: "broadcast",
        data: {
          message
        }
      });

      print(`${username}> ${message}`, "ok");
      return;
    }

    if (!authed) {
      print("blocked: log in first with /login user pass", "bad");
      return;
    }

    send({
      command: "broadcast",
      data: {
        message: trimmed
      }
    });

    print(`${username}> ${trimmed}`, "ok");
  }

  cmd.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      handleCommand(cmd.value);
      cmd.value = "";
    }
  });

  connectBtn.addEventListener("click", connect);
  disconnectBtn.addEventListener("click", disconnect);
  clearBtn.addEventListener("click", clear);

  print("terminal ready", "ok");
  print("type /help for commands", "sys");
  connect();
  cmd.focus();
</script>
</body>
</html>
