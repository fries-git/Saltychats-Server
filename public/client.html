<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSocket Login Client</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(16, 24, 40, 0.72);
      --panel-strong: rgba(15, 23, 42, 0.92);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #7c3aed;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 24%),
        linear-gradient(180deg, #090d18 0%, #0b1020 100%);
      color: var(--text);
      padding: 24px;
    }

    .shell { max-width: 1100px; margin: 0 auto; display: grid; gap: 20px; grid-template-columns: 1.1fr 0.9fr; }
    .hero { grid-column: 1 / -1; background: linear-gradient(135deg, rgba(124, 58, 237, 0.18), rgba(34, 197, 94, 0.10)); border: 1px solid var(--border); border-radius: calc(var(--radius) + 6px); padding: 22px; box-shadow: var(--shadow); backdrop-filter: blur(14px); }
    .hero-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(1.6rem, 2.8vw, 2.4rem); letter-spacing: -0.03em; }
    .subtitle { margin-top: 8px; color: var(--muted); max-width: 65ch; line-height: 1.5; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); color: var(--muted); font-size: 0.95rem; white-space: nowrap; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.12); }
    .dot.online { background: var(--accent-2); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12); }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); backdrop-filter: blur(16px); overflow: hidden; }
    .card-header { padding: 16px 18px 0; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-title { margin: 0; font-size: 1.05rem; }
    .card-body { padding: 18px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: grid; gap: 8px; margin-bottom: 14px; }
    label { font-size: 0.9rem; color: var(--muted); }
    input, button, textarea { font: inherit; }
    input, textarea { width: 100%; border: 1px solid var(--border); background: rgba(2, 6, 23, 0.55); color: var(--text); border-radius: 14px; padding: 12px 14px; outline: none; transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease; }
    input:focus, textarea:focus { border-color: rgba(124, 58, 237, 0.7); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.14); }
    textarea { min-height: 320px; resize: vertical; line-height: 1.5; white-space: pre-wrap; }
    .button-row { display: flex; gap: 10px; flex-wrap: wrap; }
    button { border: 0; border-radius: 14px; padding: 12px 16px; cursor: pointer; color: white; font-weight: 650; transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease; }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 0.92; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #5b21b6); box-shadow: 0 10px 24px rgba(124, 58, 237, 0.28); }
    .btn-ghost { background: rgba(15, 23, 42, 0.85); border: 1px solid var(--border); color: var(--text); }
    .btn-success { background: linear-gradient(135deg, #22c55e, #15803d); box-shadow: 0 10px 24px rgba(34, 197, 94, 0.20); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 10px 24px rgba(239, 68, 68, 0.20); }
    .log { min-height: 420px; max-height: 420px; overflow: auto; background: rgba(2, 6, 23, 0.45); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: grid; gap: 10px; }
    .msg { padding: 10px 12px; border-radius: 14px; border: 1px solid rgba(148, 163, 184, 0.14); line-height: 1.45; word-break: break-word; }
    .msg.system { border-color: rgba(124, 58, 237, 0.22); background: rgba(124, 58, 237, 0.10); }
    .msg.sent { border-color: rgba(34, 197, 94, 0.22); background: rgba(34, 197, 94, 0.10); }
    .msg.recv { border-color: rgba(56, 189, 248, 0.20); background: rgba(14, 165, 233, 0.10); }
    .msg.json { font-family: monospace; white-space: pre-wrap; }
    .small { color: var(--muted); font-size: 0.92rem; }
    .footer-note { margin-top: 12px; color: var(--muted); font-size: 0.88rem; line-height: 1.45; }
    @media (max-width: 900px) { .shell { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>WebSocket Login Client</h1>
          <div class="subtitle">Log in, send messages, and watch the formatted stream unfold in real time.</div>
        </div>
        <div class="badge"><span class="dot" id="statusDot"></span><span id="statusText">Disconnected</span></div>
      </div>
    </section>

    <section class="card">
      <div class="card-header"><h2 class="card-title">Login</h2></div>
      <div class="card-body">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Your username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Your password" />
        </div>
        <div class="button-row">
          <button class="btn-success" onclick="login()">Login / Register</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header"><h2 class="card-title">Message</h2></div>
      <div class="card-body">
        <div class="field">
          <label for="message">Message</label>
          <input id="message" type="text" placeholder="Type a message" />
        </div>
        <div class="button-row">
          <button class="btn-primary" onclick="sendMessage()" id="sendBtn" disabled>Send Message</button>
        </div>
      </div>
    </section>

    <section class="card" style="grid-column: 1 / -1;">
      <div class="card-header"><h2 class="card-title">Log</h2></div>
      <div class="card-body"><div class="log" id="log"></div></div>
    </section>
  </div>

  <script>
    let socket = null;
    let loggedInUser = null;

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const logEl = document.getElementById("log");
    const sendBtn = document.getElementById("sendBtn");

    function addLog(text, type = "system") {
      const item = document.createElement("div");
      item.className = `msg ${type}`;
      if (type === "recv" && typeof text === "object") {
        item.classList.add("json");
        item.textContent = JSON.stringify(text, null, 2);
      } else {
        item.textContent = text;
      }
      logEl.appendChild(item);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, online = false) {
      statusText.textContent = text;
      statusDot.classList.toggle("online", online);
    }

    function connect() {
      socket = new WebSocket("ws://localhost:8080");

      socket.onopen = () => { setStatus("Connected", true); addLog("Connected", "system"); };

      socket.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch { data = event.data; }
        addLog(data, typeof data === "object" ? "recv" : "recv");

        if (data.status === "success" && data.message === "logged in") {
          loggedInUser = document.getElementById("username").value;
          sendBtn.disabled = false;
          addLog("Login verified, you can now send messages.", "system");
        } else if (data.status === "fail") {
          sendBtn.disabled = true;
        } else if (data.status === "created") {
          addLog("New account added. Please login again to verify.", "system");
          sendBtn.disabled = true;
        }
      };

      socket.onclose = () => { setStatus("Disconnected", false); addLog("Disconnected", "system"); sendBtn.disabled = true; };
      socket.onerror = () => { setStatus("Error", false); addLog("Socket error", "system"); sendBtn.disabled = true; };
    }

    function sendJson(payload) { if (!socket || socket.readyState !== WebSocket.OPEN) return; socket.send(JSON.stringify(payload)); }

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) { addLog("Enter username and password", "system"); return; }
      sendJson({ command: "login", data: { username, password } });
      addLog(`Sent login request for ${username}`, "sent");
    }

    function sendMessage() {
      if (!loggedInUser) { addLog("Cannot send message, login not verified.", "system"); return; }
      const message = document.getElementById("message").value.trim();
      if (!message) return;
      sendJson({ command: "messageadd", data: { username: loggedInUser, message } });
      addLog(message, "sent");
    }

    connect();
  </script>
</body>
</html>
