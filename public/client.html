<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal Client</title>
<style>
body {
  margin:0;
  background:#000;
  color:#00ff9c;
  font-family: monospace;
}

#terminal {
  padding:15px;
  height:100vh;
  overflow-y:auto;
  white-space:pre-wrap;
}

#inputBar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#000;
  border-top:1px solid #00ff9c;
}

input {
  flex:1;
  background:#000;
  color:#00ff9c;
  border:none;
  padding:12px;
  font-family: monospace;
  outline:none;
}
</style>
</head>
<body>
<div id="terminal"></div>
<div id="inputBar">
  <input id="input" placeholder="type command..." autofocus />
</div>

<script>
const term = document.getElementById("terminal");
const input = document.getElementById("input");

let socket;
let loggedIn = false;
let username = "";

function log(text) {
  term.textContent += text + "\n";
  term.scrollTop = term.scrollHeight;
}

function connect() {
  const host = window.location.hostname || "localhost";
  socket = new WebSocket(`ws://${host}:8080`);

  socket.onopen = () => log("[connected]");
  socket.onclose = () => log("[disconnected]");
  socket.onerror = () => log("[error]");

  socket.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch {
      log(e.data);
      return;
    }

    if (data.status === "success" && data.message === "logged in") {
      loggedIn = true;
      log("[login successful]");
    } else if (data.status === "fail") {
      log("[login failed]");
    } else if (data.message) {
      log(data.message);
    }
  };
}

function send(obj) {
  if (socket.readyState !== 1) return;
  socket.send(JSON.stringify(obj));
}

input.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const cmd = input.value.trim();
  input.value = "";

  if (!cmd) return;

  log("> " + cmd);

  const parts = cmd.split(" ");

  if (parts[0] === "login") {
    if (parts.length < 3) {
      log("usage: login <user> <pass>");
      return;
    }

    username = parts[1];
    send({
      command: "login",
      data: { username: parts[1], password: parts[2] }
    });

  } else if (parts[0] === "send") {
    if (!loggedIn) {
      log("[not logged in]");
      return;
    }

    const message = parts.slice(1).join(" ");
    send({
      command: "broadcast",
      data: { message }
    });

  } else if (parts[0] === "ping") {
    send({ command: "ping" });

  } else {
    log("commands: login, send, ping");
  }
});

connect();
log("terminal ready. type 'login user pass'");
</script>
</body>
</html>
